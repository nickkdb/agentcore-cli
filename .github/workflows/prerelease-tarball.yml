name: Prerelease Tarball

on:
  push:
    branches: [main]
  # Manually trigger to pull in the latest CDK constructs changes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prerelease-tarball
  cancel-in-progress: true

jobs:
  prerelease-tarball:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - uses: astral-sh/setup-uv@v7
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: aws
      - name: Clone CDK repo
        run: |
          git clone --depth 1 "https://x-access-token:${CDK_REPO_TOKEN}@github.com/${CDK_REPO}.git" /tmp/cdk-repo
        env:
          CDK_REPO_TOKEN: ${{ steps.app-token.outputs.token }}
          CDK_REPO: ${{ secrets.CDK_REPO_NAME }}
      - run: npm run bundle
        env:
          AGENTCORE_CDK_PATH: /tmp/cdk-repo
      - name: Get tarball info
        id: tarball
        run: |
          TARBALL_NAME=$(ls *.tgz | head -1 | xargs basename)
          echo "name=$TARBALL_NAME" >> $GITHUB_OUTPUT
      - name: Create or update prerelease
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARBALL_NAME: ${{ steps.tarball.outputs.name }}
        run: |
          TAG="prerelease"

          # Delete existing release if it exists (to update the tarball)
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # Create a new pre-release with the tarball
          gh release create "$TAG" \
            "${TARBALL_NAME}" \
            --title "Prerelease" \
            --notes "Auto-generated tarball from the latest commit on main." \
            --prerelease \
            --target "${{ github.sha }}"
