name: Claude Security Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description:
          'PR number to review (note: workflow_dispatch will NOT post inline comments — the action only attaches the
          inline-comment MCP server on PR-context events. Use this only for end-to-end smoke-testing the prompt
          plumbing.)'
        required: true
        type: string

permissions:
  id-token: write
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group:
    pr-security-review-${{ github.event.pull_request.number || github.event.review.pull_request_url || inputs.pr_number
    }}
  cancel-in-progress: true

jobs:
  authorize:
    runs-on: ubuntu-latest
    # Filter event subtypes early:
    # - pull_request_review: only the 'approved' state authorizes (comment/changes-requested are ignored).
    # - pull_request_target labeled: only the 'safe-to-review' label triggers (other label changes are ignored).
    if: |
      (github.event_name != 'pull_request_review' || github.event.review.state == 'approved') &&
      (github.event_name != 'pull_request_target' || github.event.action != 'labeled' ||
       github.event.label.name == 'safe-to-review')
    outputs:
      authorized: ${{ steps.auth.outputs.authorized || steps.dispatch-auth.outputs.authorized }}
    steps:
      - name: Check authorization
        id: auth
        if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review'
        uses: actions/github-script@v9
        with:
          script: |
            // pull_request_target opened/reopened/synchronize: gate on the PR author.
            // pull_request_target labeled (safe-to-review): gate on the labeler (sender).
            // pull_request_review (approved): gate on the reviewer who approved.
            const isApproval = context.eventName === 'pull_request_review';
            const isLabel =
              context.eventName === 'pull_request_target' && context.payload.action === 'labeled';
            let user;
            let reason;
            if (isApproval) {
              user = context.payload.review.user.login;
              reason = `approver ${user}`;
            } else if (isLabel) {
              user = context.payload.sender.login;
              reason = `labeler ${user}`;
            } else {
              user = context.payload.pull_request.user.login;
              reason = `PR author ${user}`;
            }
            try {
              await github.rest.teams.getMembershipForUserInOrg({
                org: context.repo.owner,
                team_slug: 'agentcore-cli-devs',
                username: user,
              });
              console.log(`${reason} is a member of agentcore-cli-devs`);
              core.setOutput('authorized', 'true');
            } catch (teamError) {
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: user,
                });
                const hasWriteAccess = ['write', 'admin'].includes(data.permission);
                if (hasWriteAccess) {
                  console.log(`${reason} has write access (${data.permission})`);
                  core.setOutput('authorized', 'true');
                } else {
                  console.log(`${reason} does not have write access (${data.permission}) — skipping review`);
                  core.setOutput('authorized', 'false');
                }
              } catch (collabError) {
                console.log(`${reason} authorization check failed (${collabError.status}) — skipping review`);
                core.setOutput('authorized', 'false');
              }
            }

      - name: Auto-authorize workflow_dispatch
        id: dispatch-auth
        if: github.event_name == 'workflow_dispatch'
        run: echo "authorized=true" >> "$GITHUB_OUTPUT"

  security-review:
    needs: authorize
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_REGION: us-west-2
    steps:
      # Generate the GitHub App token first so every subsequent github-script step can
      # use it. The default GITHUB_TOKEN is read-only on pull_request_target /
      # pull_request_review events from forks, which makes label/comment writes 403.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v9
        env:
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const num =
              context.eventName === 'workflow_dispatch'
                ? parseInt(process.env.PR_NUMBER_INPUT, 10)
                : context.payload.pull_request.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: num,
            });
            core.setOutput('number', num);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_ref', pr.base.ref);

      - name: Add claude-security-reviewing label
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'claude-security-reviewing',
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'claude-security-reviewing',
                  color: 'D73A4A',
                  description: 'Claude Code /security-review in progress',
                });
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['claude-security-reviewing'],
            });

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Build security review prompt
        id: build-prompt
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          set -euo pipefail
          # Ensure we have the base branch locally so origin/<base> resolves.
          git fetch --no-tags origin "$BASE_REF"
          BASE="origin/$BASE_REF"

          export GIT_STATUS="$(git status)"
          export FILES_MODIFIED="$(git diff --name-only "$BASE"...)"
          export COMMITS="$(git log --no-decorate "$BASE"...)"
          # Cap diff at ~512KB to keep the prompt under model context limits.
          export DIFF_CONTENT="$(git diff "$BASE"... | head -c 524288)"

          OUT="${RUNNER_TEMP}/security-review-prompt.md"
          python3 - > "$OUT" <<'PY'
          import os, sys
          tpl = open(".github/prompts/security-review.md").read()
          for k in ("PR_NUMBER","BASE_REF","HEAD_SHA","GIT_STATUS","FILES_MODIFIED","COMMITS","DIFF_CONTENT"):
              tpl = tpl.replace("{{"+k+"}}", os.environ.get(k, ""))
          sys.stdout.write(tpl)
          PY

          echo "prompt_file=$OUT" >> "$GITHUB_OUTPUT"
          echo "Prompt size: $(wc -c < "$OUT") bytes"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.BEDROCK_SECURITY_REVIEW_ROLE_ARN }}
          aws-region: us-west-2

      - name: Read prompt file
        id: prompt
        env:
          PROMPT_FILE: ${{ steps.build-prompt.outputs.prompt_file }}
        run: |
          set -euo pipefail
          {
            echo "prompt<<__SECREVIEW_EOF__"
            cat "$PROMPT_FILE"
            echo "__SECREVIEW_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code security review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: 'true'
          prompt: ${{ steps.prompt.outputs.prompt }}
          show_full_output: 'true'
          # Allow-listing this MCP tool name is what tells the action to register the
          # github_inline_comment MCP server. See anthropics/claude-code-action
          # src/mcp/install-mcp-server.ts.
          claude_args: >-
            --model us.anthropic.claude-opus-4-7 --max-turns 30 --allowedTools
            mcp__github_inline_comment__create_inline_comment

      - name: Count buffered findings
        id: findings
        if: always()
        run: |
          set -euo pipefail
          BUFFER=/tmp/inline-comments-buffer.jsonl
          if [ -s "$BUFFER" ]; then
            COUNT=$(wc -l < "$BUFFER" | tr -d ' ')
          else
            COUNT=0
          fi
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Buffered findings: $COUNT"

      - name: Post security review summary comment
        if: always()
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          FINDING_COUNT: ${{ steps.findings.outputs.count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const count = parseInt(process.env.FINDING_COUNT || '0', 10);
            const runUrl = process.env.RUN_URL;
            const body =
              count > 0
                ? `**Claude Security Review:** posted ${count} inline finding${count === 1 ? '' : 's'} on this PR. ([run](${runUrl}))`
                : `**Claude Security Review:** no high-confidence findings. ([run](${runUrl}))`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Remove claude-security-reviewing label
        if: always()
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'claude-security-reviewing',
              });
            } catch (error) {
              console.log('Label removal failed (may not exist):', error.message);
            }
